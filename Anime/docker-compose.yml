version: '3.8'

services:
  anime-api:
    build: .
    ports:
      - "10000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=AnimeDb;Username=postgres;Password=yourpassword
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: AnimeDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: